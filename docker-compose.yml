version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: aikosh5-postgres
    environment:
      POSTGRES_USER: aikosh5
      POSTGRES_PASSWORD: aikosh5_password
      POSTGRES_DB: aikosh5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aikosh5 -d aikosh5"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aikosh5-network

  redis:
    image: redis:7-alpine
    container_name: aikosh5-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aikosh5-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aikosh5-backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://aikosh5:aikosh5_password@postgres:5432/aikosh5
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aikosh5-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: aikosh5-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - aikosh5-network
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres-data:
  redis-data:

networks:
  aikosh5-network:
    driver: bridge
