version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: aikosh5-postgres
    environment:
      POSTGRES_USER: aikosh5
      POSTGRES_PASSWORD: aikosh5_password
      POSTGRES_DB: aikosh5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aikosh5 -d aikosh5"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aikosh5-network

  redis:
    image: redis:7-alpine
    container_name: aikosh5-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aikosh5-network

  minio:
    image: minio/minio:latest
    container_name: aikosh5-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - aikosh5-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aikosh5-backend
    environment:
      - DATABASE_URL=postgresql://aikosh5:aikosh5_password@postgres:5432/aikosh5
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - aikosh5-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aikosh5-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - aikosh5-network
    command: npm run dev -- --host

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aikosh5-celery
    environment:
      - DATABASE_URL=postgresql://aikosh5:aikosh5_password@postgres:5432/aikosh5
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - aikosh5-network
    command: celery -A app.celery_app worker --loglevel=info

  flower:
    image: mher/flower:0.9.7
    container_name: aikosh5-flower
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery-worker
    networks:
      - aikosh5-network

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  aikosh5-network:
    driver: bridge
